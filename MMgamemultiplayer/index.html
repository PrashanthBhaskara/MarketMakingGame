<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MM Game Multiplayer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Authoritative WebSocket multiplayer</p>
          <h1>Market Maker Card Game</h1>
        </div>
        <div id="connectionStatus" class="connection-status">Not connected</div>
      </header>

      <main>
        <section id="connectPanel" class="setup-panel">
          <div class="setup-copy">
            <h2>Create or join a room</h2>
            <p>
              The server owns the deck, timers, hidden cards, trades, and bot decisions. Each
              browser only receives the cards and state that player is allowed to see.
            </p>
          </div>

          <div class="join-grid">
            <label>
              Your name
              <input id="playerNameInput" type="text" maxlength="24" placeholder="Player">
            </label>
            <label>
              Room code
              <input id="roomCodeInput" type="text" maxlength="8" placeholder="ABCDE">
            </label>
          </div>

          <div class="settings-grid">
            <label>
              Markets before each reveal
              <input id="marketsPerStageInput" type="number" min="1" max="10" step="1" value="5">
            </label>
            <label>
              Quote response seconds
              <input id="responseSecondsInput" type="number" min="1" max="30" step="0.5" value="3">
            </label>
            <label>
              Maker pay before first reveal
              <input id="feeStage0Input" type="number" min="0" max="50" step="0.25" value="2">
            </label>
            <label>
              Maker pay after one reveal
              <input id="feeStage1Input" type="number" min="0" max="50" step="0.25" value="2">
            </label>
            <label>
              Maker pay after two reveals
              <input id="feeStage2Input" type="number" min="0" max="50" step="0.25" value="2">
            </label>
            <label class="toggle-label">
              <input id="fillBotsInput" type="checkbox" checked>
              <span>Fill empty seats with bots</span>
            </label>
            <label class="toggle-label">
              <input id="practiceModeInput" type="checkbox">
              <span>Practice mode: hide live position and market state</span>
            </label>
          </div>

          <div class="button-row">
            <button id="createRoomButton" class="primary-button" type="button">Create room</button>
            <button id="joinRoomButton" class="secondary-button" type="button">Join room</button>
          </div>
          <div id="connectError" class="error-text"></div>
        </section>

        <section id="lobbyPanel" class="lobby-panel" hidden></section>

        <section id="gamePanel" class="game-grid" hidden>
          <section class="table-zone" aria-label="Game table">
            <div id="opponentRow" class="opponent-row"></div>

            <div class="board-strip">
              <div>
                <p class="eyebrow">Board cards</p>
                <div id="boardCards" class="board-cards"></div>
              </div>
              <div id="stageBadge" class="stage-badge"></div>
            </div>

            <div id="humanSeat" class="human-seat"></div>
          </section>

          <aside class="control-rail">
            <section id="marketSummary" class="summary-panel"></section>
            <section id="phaseControls" class="action-panel"></section>
            <section class="log-panel">
              <div class="panel-heading">
                <h2>Market tape</h2>
              </div>
              <ol id="eventLog" class="event-log"></ol>
            </section>
          </aside>
        </section>

        <section id="showdownPanel" class="showdown-panel" hidden></section>
      </main>
    </div>

    <script src="client.js"></script>
  </body>
</html>
